# ⚠️ 雲端排程已停用：衛福部長照平台、護理學會、藥師公會等網站封鎖境外 IP，
# GitHub Actions 主機（美國）連線逾時，無法雲端抓取。
# 實際更新機制：機構 Mac 每日 07:10 由 LaunchAgent com.yaoxiang.course-search
# 執行 update.py（抓取 → 建頁 → git push），GitHub Pages 自動發布 docs/。
# 此 workflow 保留手動觸發，供日後測試來源是否解除封鎖。
name: 手動測試雲端抓取

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 抓取課程並重建頁面
        run: |
          python fetch_all.py
          python build_page.py
          mkdir -p docs
          cp 積分課程搜尋.html docs/index.html

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/ 積分課程搜尋.html
          if git diff --cached --quiet; then
            echo "無變更"
          else
            git commit -m "自動更新課程資料 $(date +%Y-%m-%d)"
            git push
          fi
