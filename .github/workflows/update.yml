name: 每日更新積分課程

on:
  schedule:
    - cron: "30 23 * * *"   # UTC 23:30 = 台北 07:30
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 抓取課程並重建頁面
        run: |
          python fetch_all.py
          python build_page.py
          mkdir -p docs
          cp 積分課程搜尋.html docs/index.html

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/ 積分課程搜尋.html
          if git diff --cached --quiet; then
            echo "無變更"
          else
            git commit -m "自動更新課程資料 $(date +%Y-%m-%d)"
            git push
          fi
